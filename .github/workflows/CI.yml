name: CI
on:
 
  push:

  
  workflow_dispatch:
permissions: write-all
jobs:
  SAST:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: github/CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: none
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses:  github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
  SCA:
  
    runs-on: ubuntu-latest
   
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          mvn package
       
      - name: Dependency Check
        uses: dependency-check/Dependency-Check_Action@1.1.0
        with:
          project: 'ms-catalog-content'
          path: '.'
          format: 'JSON'
          args: >
            --disableCentral
            
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: reportSCA
          path: ${{github.workspace}}/reports

  SCA_Analized:
    needs: SCA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download report
        uses: actions/download-artifact@v4
        with:
         name: reportSCA
      - name: analaisis
        run : |
         ls 
         vulnerabilities=$(jq -r '.dependencies[0].evidenceCollected.vendorEvidence.confidence' dependency-check-report.json)
         readarray -t bash_vul <<< "$vulnerabilities"
         echo "${bash_vul[@]}"
         for i in "${vulnerabilities[@]}"
         do
          if [[ "$i" == '"HIGH"' || "$i" == '"HIGHEST"' || "$i" == '"MEDIUM"' ]]; then
           echo "Vulnerabilidades criticas por resolver"
           exit 1
          else
           echo "Sin vulnerabilidades criticas"
          fi
         done
         

